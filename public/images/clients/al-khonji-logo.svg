  >الخنجي</text>

  <!-- Thin line separator -->
  <line x1="30" y1="68" x2="210" y2="68" stroke="#1A1A1A" stroke-width="0.6" opacity="0.4"/>

  <!-- ALKHONJI text -->
  <text
    x="120" y="83"
    font-family="'Gill Sans', 'Optima', 'Trebuchet MS', 'Arial', sans-serif"
