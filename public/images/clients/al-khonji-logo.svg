<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 90" fill="none">
  <!-- Diamond decorations -->
  <rect x="107" y="6" width="5" height="5" fill="#1A1A1A" transform="rotate(45 109.5 8.5)"/>
  <rect x="120" y="6" width="5" height="5" fill="#1A1A1A" transform="rotate(45 122.5 8.5)"/>
  <rect x="133" y="6" width="5" height="5" fill="#1A1A1A" transform="rotate(45 135.5 8.5)"/>

  <!-- Arabic calligraphy: الخنجي -->
  <text
    x="120" y="58"
    font-family="'Scheherazade New', 'Noto Naskh Arabic', 'Arabic Typesetting', 'Traditional Arabic', serif"
    font-size="46"
