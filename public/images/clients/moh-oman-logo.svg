<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 72" fill="none">
  <!-- Omani Khanjar silhouette (simplified) -->
  <g transform="translate(18, 4)">
    <!-- Blade -->
    <path d="M17 8 C17 8 14 18 13 28 C12 36 13 42 17 44 C21 42 22 36 21 28 C20 18 17 8 17 8Z" fill="#2a6049"/>
    <!-- Guard crosspiece -->
    <rect x="10" y="26" width="14" height="3" rx="1.5" fill="#2a6049"/>
    <!-- Handle -->
    <path d="M14 29 L14 48 C14 50 16 52 17 52 C18 52 20 50 20 48 L20 29Z" fill="#2a6049"/>
    <!-- Belt loop left -->
