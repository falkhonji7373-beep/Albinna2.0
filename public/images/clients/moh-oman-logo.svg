  <text x="70" y="28" font-family="serif" font-size="13" font-weight="700" fill="#1a3328" letter-spacing="0.5">وزارة الصحة</text>
  <!-- Arabic: سلطنة عُمان -->
  <text x="70" y="46" font-family="serif" font-size="10" fill="#2a6049" letter-spacing="0.3">سلطنة عُمان</text>
  <!-- English text -->
  <text x="70" y="62" font-family="Arial, sans-serif" font-size="7.5" font-weight="600" fill="#1a3328" letter-spacing="1.2" text-anchor="start">MINISTRY OF HEALTH · OMAN</text>
</svg>
